# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
# Enables namespacing of each library's R class so that its R class includes only the
# resources declared in the library itself and none from the library's dependencies,
# thereby reducing the size of the R class for that library
android.nonTransitiveRClass=true

# Force Gradle to use local JDK 23 (with jlink.exe) to bypass incorrect environment JAVA_HOME
org.gradle.java.home=C:/Program Files/Java/jdk-23

# Ensure Gradle toolchains are enabled and prevent scanning of IDE directories
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.paths=C:/Program Files/Java/jdk-23,C:/Program Files/Java/jdk-26.0.1

android.disallowKotlinSourceSets=false
ksp.useKSP2=true
